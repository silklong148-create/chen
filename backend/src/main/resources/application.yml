server:
  port: 8080
spring:
  application:
    name: mysqladmin-server
  datasource:
    url: jdbc:h2:file:./data/mysqladmin-auth;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
springdoc:
  swagger-ui:
    path: /swagger-ui.html
